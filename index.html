<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Northlight PMO — Retired</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --midnight: #0E0E14;
    --surface:  #12121E;
    --border:   #1E2035;
    --text:     #FFFFFF;
    --cloud:    #C8CCE0;
    --muted:    #8A92A8;
    --boreal:   #5B8DD9;
  }
  body { background: var(--midnight); color: var(--cloud); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 32px; }
  .top-bar { position: fixed; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #4FC3C8 0%, #5B8DD9 30%, #8B6FD4 65%, #C46FAA 100%); }
  .label { font-size: 10px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
  .title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .body { font-size: 13px; color: var(--muted); line-height: 1.7; max-width: 400px; }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="label">Northlight PMO</div>
<div class="title">This dashboard has been retired.</div>
<div class="body">The portfolio view has moved to the Northlight OS — internal use only. If you were looking for a specific project dashboard, check the <code>northlight-pmo</code> repo for individual phase HTML files.</div>
</body>
</html>
